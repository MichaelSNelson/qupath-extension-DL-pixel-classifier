name: Notify catalog of release

# Fires when this repo publishes a release. Sends a repository_dispatch event
# of type `extension-release` to the QuPath extension catalog so it can
# auto-bump catalog.json to the new tag and asset URL.
#
# Also exposes a workflow_dispatch button for manual triggering -- useful
# for verifying the auto-update round-trip without cutting a fresh release,
# or for backfilling a release whose original `release: published` event
# never reached the workflow (rare but possible).
#
# See uw-loci/qupath-catalog-mikenelson/MAINTAINERS.md for the full auto-update flow, the
# org-level CATALOG_DISPATCH_TOKEN secret it uses, and recovery steps if
# a dispatch fails.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to dispatch (default: latest published release)"
        required: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag and asset URL
        id: rel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            if [ -z "$TAG" ]; then
              TAG=$(gh release view --repo "${{ github.repository }}" --json tagName --jq '.tagName')
            fi
            ASSETS_JSON=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets')
          else
            TAG="${{ github.event.release.tag_name }}"
            ASSETS_JSON='${{ toJSON(github.event.release.assets) }}'
          fi
          # Asset selection priority:
          #   1. *-all.jar (shadow/fat jar with bundled deps)
          #   2. The plain extension jar -- any *.jar that is NOT
          #      -javadoc.jar or -sources.jar
          #   3. As a last resort, anything ending in .jar
          # The previous fallback ("any .jar") was matching -javadoc.jar
          # first because that name sorts before the plain extension jar
          # in the assets list. That sent a useless documentation jar to
          # the catalog (v0.7.5 broke updates for users this way).
          # gh release view returns "url"; the release event payload uses
          # "browser_download_url". Normalize to one field name with the
          # short-circuit "//" so this works for both trigger sources.
          ASSET_URL=$(echo "$ASSETS_JSON" | jq -r '
            def dl: (.browser_download_url // .url);
            ([.[] | select(.name | endswith("-all.jar"))][0] | dl?)
            // ([.[] | select((.name | endswith(".jar"))
                              and (.name | endswith("-javadoc.jar") | not)
                              and (.name | endswith("-sources.jar") | not))][0] | dl?)
            // ([.[] | select(.name | endswith(".jar"))][0] | dl?)
            // empty')
          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "::error::No .jar asset found on release $TAG"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "asset_url=$ASSET_URL" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=$TAG asset=$ASSET_URL"

      - name: Send release event to catalog
        env:
          GH_TOKEN: ${{ secrets.CATALOG_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          gh api repos/uw-loci/qupath-catalog-mikenelson/dispatches \
            -f event_type=extension-release \
            -F "client_payload[repo]=${{ github.repository }}" \
            -F "client_payload[tag]=${{ steps.rel.outputs.tag }}" \
            -F "client_payload[asset_url]=${{ steps.rel.outputs.asset_url }}"
